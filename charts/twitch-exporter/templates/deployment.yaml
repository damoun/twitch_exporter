apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "twitch_exporter.fullname" . }}
  labels:
    {{- include "twitch_exporter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "twitch_exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "twitch_exporter.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "twitch_exporter.serviceAccountName" . }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - "--twitch.client-id=$(TWITCH_CLIENT_ID)"
            - "--twitch.client-secret=$(TWITCH_CLIENT_SECRET)"
            {{- if .Values.twitch.userToken }}
            - "--twitch.access-token=$(TWITCH_ACCESS_TOKEN)"
            - "--twitch.refresh-token=$(TWITCH_REFRESH_TOKEN)"
            {{- end }}
            {{- range .Values.twitch.channels }}
            - "--twitch.channel={{ . }}"
            {{- end }}
            {{- if .Values.twitch.eventsub.enabled }}
            - "--eventsub.enabled"
            - "--eventsub.webhook-url=$(EVENTSUB_WEBHOOK_URL)"
            - "--eventsub.webhook-secret=$(EVENTSUB_WEBHOOK_SECRET)"
            {{- end }}
            {{- range .Values.twitch.additionalParameters }}
            - "{{ . }}"
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "twitch_exporter.secretName" . }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
