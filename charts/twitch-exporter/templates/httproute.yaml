{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "twitch_exporter.fullname" . }}
  labels:
    {{- include "twitch_exporter.labels" . | nindent 4 }}
spec:
  {{- with .Values.gateway.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if .Values.gateway.rules }}
  rules:
    {{- range .Values.gateway.rules }}
    - {{- if .matches }}
      matches:
        {{- toYaml .matches | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ include "twitch_exporter.fullname" $ }}
          port: {{ $.Values.service.port }}
    {{- end }}
  {{- else }}
  rules:
    - backendRefs:
        - name: {{ include "twitch_exporter.fullname" . }}
          port: {{ .Values.service.port }}
  {{- end }}
{{- end }}
