replicaCount: 1

image:
  repository: ghcr.io/damoun/twitch-exporter
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

twitch:
  # client-id is required at all times
  clientId: ""

  # client secret is preferred for use without private data, as it uses no oauth
  # flow to grant access to the API. Endpoints such as sub counts are not with
  # this method.
  #
  # if both client-secret and access-token are provided, client-secret will be
  # used.
  clientSecret: ""

  # access-token & refresh-token are required for use with private data, such
  # as sub counts.
  accessToken: ""
  refreshToken: ""

  # channels is a list of channels to export metrics for.
  channels:
    - jordofthenorth
    - timthetatman
    - dam0un
    - surdaft

  # eventsub is disabled due to the need to expose the service
  eventsub:
    enabled: false
    webhookURL: ""
    webhookSecret: ""

  # additionalParameters is a list of additional parameters to pass to the
  # exporter, such as --collector.channel_chat_messages_total
  additionalParameters: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

securityContext:
  runAsNonRoot: true
  fsGroup: 65534

containerSecurityContext:
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 9184

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  #  - host: twitch-exporter.example.com
  #    paths:
  #      - path: /
  #        pathType: Prefix
  tls: []
  #  - secretName: twitch-exporter-tls
  #    hosts:
  #      - twitch-exporter.example.com

gateway:
  enabled: false
  parentRefs: []
  #  - name: my-gateway
  #    namespace: default
  hostnames: []
  rules: []
  #  - matches:
  #      - path:
  #          type: PathPrefix
  #          value: /

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: false
  interval: ""
  scrapeTimeout: ""
  labels: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []

podLabels: {}

podAnnotations: {}
