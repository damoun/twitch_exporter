replicaCount: 1

image:
  repository: ghcr.io/damoun/twitch-exporter
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

twitch:
  # Use an existing Secret instead of creating one from values below.
  # The Secret must contain the expected env var keys (e.g. TWITCH_CLIENT_ID).
  existingSecret: ""

  # client-id is required at all times
  clientId: ""

  # client secret is preferred for use without private data, as it uses no oauth
  # flow to grant access to the API. Endpoints such as sub counts are not with
  # this method.
  #
  # if both client-secret and access-token are provided, client-secret will be
  # used.
  clientSecret: ""

  # Set to true to enable user token mode (access-token & refresh-token).
  # Required for private data such as sub counts.
  # When using existingSecret, set this to true if the Secret contains
  # TWITCH_ACCESS_TOKEN and TWITCH_REFRESH_TOKEN.
  userToken: false
  accessToken: ""
  refreshToken: ""

  # channels is a list of channels to export metrics for.
  channels: []

  # eventsub is disabled due to the need to expose the service
  eventsub:
    enabled: false
    webhookURL: ""
    webhookSecret: ""

  # additionalParameters is a list of additional parameters to pass to the
  # exporter, such as --collector.channel_chat_messages_total
  additionalParameters: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

securityContext:
  runAsNonRoot: true
  fsGroup: 65534

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 9184

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  #  - host: twitch-exporter.example.com
  #    paths:
  #      - path: /
  #        pathType: Prefix
  tls: []
  #  - secretName: twitch-exporter-tls
  #    hosts:
  #      - twitch-exporter.example.com

gateway:
  enabled: false
  parentRefs: []
  #  - name: my-gateway
  #    namespace: default
  hostnames: []
  rules: []
  #  - matches:
  #      - path:
  #          type: PathPrefix
  #          value: /

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false
  # Allow ingress from these namespaces (e.g. monitoring, traefik)
  allowNamespaces: []
  #  - monitoring
  #  - traefik
  # Custom ingress from rules (podSelector, namespaceSelector, ipBlock)
  ingressFrom: []
  #  - ipBlock:
  #      cidr: 10.0.0.0/8
  egress:
    enabled: false
    rules:
      # DNS resolution (kube-system)
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
        ports:
          - port: 53
            protocol: UDP
          - port: 53
            protocol: TCP
      # HTTPS (Twitch API)
      - ports:
          - port: 443
            protocol: TCP

serviceMonitor:
  enabled: false
  namespace: ""
  interval: ""
  scrapeTimeout: ""
  honorLabels: false
  jobLabel: ""
  labels: {}
  relabelings: []
  metricRelabelings: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []

podLabels: {}

podAnnotations: {}
